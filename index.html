<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dajek Network — Soluciones Tecnológicas Integrales</title>
    <link rel="icon" type="image/png" href="/dajek_icon.png" />

    <!-- SEO Meta -->
    <meta name="description" content="Dajek Network: arquitectura de redes, ciberseguridad avanzada, desarrollo de software y soporte 24/7 para empresas en México y LATAM." />
    <meta name="keywords" content="networking, ciberseguridad, infraestructura IT, desarrollo software, smart buildings, soporte TI, LATAM" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Dajek Network" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dajeknetwork.com/" />
    <meta property="og:title" content="Dajek Network — Soluciones Tecnológicas Integrales" />
    <meta property="og:description" content="Transformamos la infraestructura digital de su empresa con arquitectura de redes robusta, ciberseguridad avanzada y desarrollo de software a medida." />
    <meta property="og:image" content="https://dajeknetwork.com/dajek_nobg.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dajek Network — Soluciones Tecnológicas Integrales" />
    <meta name="twitter:description" content="Arquitectura de redes, ciberseguridad, cloud y desarrollo de software para empresas en LATAM." />
    <meta name="twitter:image" content="https://dajeknetwork.com/dajek_nobg.png" />

    <!-- Basic CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self'; frame-ancestors 'none';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Fonts -->
    <!-- Font Preconnect & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0ea5e9", // Sky-500
              secondary: "#0f172a", // Deep slate blue
              accent: "#38bdf8",
              "background-light": "#f8fafc", // Slate 50
              "background-dark": "#020617", // Rich dark blue almost black
              "surface-light": "#ffffff",
              "surface-dark": "#0f172a", // Deep navy blue
              "card-light": "#ffffff",
              "card-dark": "#1e293b", // Lighter navy for cards
              "text-light": "#0f172a", // Slate 900
              "text-dark": "#cbd5e1", // Slate 300
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            keyframes: {
              scroll: {
                "0%": { transform: "translateX(0)" },
                "100%": { transform: "translateX(calc(-100% / 2))" },
              },
            },
            animation: {
              scroll: "scroll 40s linear infinite",
            },
          },
        },
      };
    </script>

    <!-- Custom Styles for Glassmorphism and Gradients -->
    <style type="text/tailwindcss">
      @layer base {
        :root {
          --pattern-color: #bae6fd; /* Sky 200 for light mode - subtle */
        }
        .dark {
          --pattern-color: #38bdf8; /* Sky 400 for dark mode */
        }
        body {
          @apply bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-300 antialiased transition-colors duration-300;
          font-family: "Inter", sans-serif;
        }
      }
      @layer utilities {
        .glass-card {
          @apply bg-white/70 dark:bg-[#0f172a]/80 backdrop-blur-md border border-slate-200 dark:border-sky-400/10;
        }
        .gradient-text {
          background: linear-gradient(to right, #0ea5e9, #6366f1);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .dark .gradient-text {
          background: linear-gradient(to right, #38bdf8, #0ea5e9, #6366f1);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .hero-mesh {
          background-image:
            radial-gradient(
              at 0% 0%,
              rgba(14, 165, 233, 0.1) 0,
              transparent 50%
            ),
            radial-gradient(
              at 100% 0%,
              rgba(79, 70, 229, 0.1) 0,
              transparent 50%
            );
        }
        .dark .hero-mesh {
          background-image:
            radial-gradient(
              at 0% 0%,
              rgba(14, 165, 233, 0.15) 0,
              transparent 50%
            ),
            radial-gradient(
              at 100% 0%,
              rgba(79, 70, 229, 0.1) 0,
              transparent 50%
            );
        }
      }
      /* Scrollbar customization */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        @apply bg-slate-50 dark:bg-[#020617];
      }
      ::-webkit-scrollbar-thumb {
        @apply bg-slate-200 dark:bg-[#1e293b];
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        @apply bg-sky-500;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "react": "https://esm.sh/react@^19.2.4"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
